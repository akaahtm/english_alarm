name: EBS Easy English Bot

on:
  schedule:
    # KST 11:00 ~ 16:00, 1시간마다, 월~토 (UTC = KST-9)
    - cron: '0 2,3,4,5,6,7 * * 1-6'
  workflow_dispatch:          # 수동 실행 버튼

jobs:
  run-bot:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install ffmpeg
        run: sudo apt-get install -y ffmpeg

      - name: Install dependencies
        run: pip install -r requirements.txt

      # last_date.json을 캐시로 유지 (실행마다 날짜 기억)
      - name: Restore last_date cache
        uses: actions/cache@v4
        with:
          path: last_date.json
          key: last-date-${{ github.run_id }}
          restore-keys: |
            last-date-

      - name: Run bot
        env:
          GEMINI_API_KEY:   ${{ secrets.GEMINI_API_KEY }}
          TELEGRAM_TOKEN:   ${{ secrets.TELEGRAM_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: python main.py

      - name: Save last_date cache
        uses: actions/cache/save@v4
        if: always()
        with:
          path: last_date.json
          key: last-date-${{ github.run_id }}
